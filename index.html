<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity | Master Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #10b981;
            --warning: #ef4444;
            --secondary: #6366f1;
            --text: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                        var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- MONTHLY INTELLIGENCE BAR --- */
        .intel-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .stat-group h4 { margin: 0; font-size: 0.7rem; letter-spacing: 2px; color: #94a3b8; text-transform: uppercase; }
        .stat-group p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; font-family: monospace; }

        /* --- BENTO GRID --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.4s ease;
            grid-column: span 12;
        }

        @media (min-width: 768px) {
            .card-half { grid-column: span 6; }
            .card-third { grid-column: span 4; }
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- HABIT BUTTONS --- */
        .habit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .btn-orb {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.2s;
        }

        .btn-tick:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .btn-cross:hover { background: var(--warning); box-shadow: 0 0 15px var(--warning); }

        /* --- INPUTS --- */
        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .balance-glow { font-size: 2.5rem; text-align: center; margin: 15px 0; color: var(--accent); }

    </style>
</head>
<body>

    <h1 style="letter-spacing: 8px; font-weight: 200;">ANTI-GRAVITY</h1>
    <p style="color: var(--secondary); margin-bottom: 40px;">V2.0 | PERFORMANCE ARCHITECTURE</p>

    <div class="intel-bar">
        <div class="stat-group">
            <h4>Monthly Discipline</h4>
            <p id="month-discipline">0%</p>
        </div>
        <div class="stat-group">
            <h4>Monthly Outflow</h4>
            <p id="month-expense">₹0</p>
        </div>
        <div class="stat-group">
            <h4>Active Streaks</h4>
            <p id="active-streaks">0</p>
        </div>
    </div>

    <div class="bento-grid">
        
        <div class="card card-half">
            <h3 style="margin-top:0">Mission Log</h3>
            <div id="habit-list"></div>
        </div>

        <div class="card card-half">
            <h3 style="margin-top:0">Skill Trajectory</h3>
            <canvas id="skillRadar" height="250"></canvas>
        </div>

        <div class="card card-third">
            <h3 style="margin-top:0">Log Weight</h3>
            <input type="text" id="exp-name" placeholder="Item Name">
            <input type="number" id="exp-amount" placeholder="Amount (₹)">
            <div style="display:flex; gap:10px;">
                <button class="card" style="padding:10px; cursor:pointer;" onclick="addFin('expense')">Expense</button>
                <button class="card" style="padding:10px; cursor:pointer; background: var(--accent); color:black;" onclick="addFin('income')">Income</button>
            </div>
        </div>

        <div class="card card-third">
            <h3 style="margin-top:0">Total Altitude</h3>
            <div class="balance-glow" id="total-bal">₹0</div>
            <p style="text-align:center; font-size:0.7rem; color:#64748b;">AUTO-STABILIZING SYSTEMS ACTIVE</p>
        </div>

        <div class="card card-third">
            <h3 style="margin-top:0">Recent Orbit</h3>
            <div id="history-list" style="max-height:150px; overflow-y:auto; font-size:0.8rem;"></div>
        </div>

    </div>

    <script>
        // DATA STORAGE
        let habits = JSON.parse(localStorage.getItem('ag_v2_habits')) || [
            {name: "Wake up time", streak: 0},
            {name: "Morning Workout", streak: 0},
            {name: "Deep Work", streak: 0},
            {name: "Project Work", streak: 0},
            {name: "Cold Shower", streak: 0},
            {name: "No Porn", streak: 0},
            {name: "Skills Upgradation", streak: 0}
        ];
        let transactions = JSON.parse(localStorage.getItem('ag_v2_fin')) || [];

        // RE-RENDER FUNCTIONS
        function renderAll() {
            // Render Habits
            const hList = document.getElementById('habit-list');
            hList.innerHTML = '';
            let totalStreaks = 0;
            habits.forEach((h, i) => {
                totalStreaks += h.streak;
                hList.innerHTML += `
                    <div class="habit-item">
                        <span>${h.name} <small style="color:var(--secondary)">🔥${h.streak}</small></span>
                        <div>
                            <button class="btn-orb btn-cross" onclick="updateHabit(${i}, false)">✕</button>
                            <button class="btn-orb btn-tick" onclick="updateHabit(${i}, true)">✓</button>
                        </div>
                    </div>`;
            });

            // Render Finances
            const fList = document.getElementById('history-list');
            const balDisp = document.getElementById('total-bal');
            fList.innerHTML = '';
            let bal = 0; let mExp = 0;
            transactions.forEach(t => {
                const isExp = t.type === 'expense';
                bal += isExp ? -t.amount : t.amount;
                if(isExp) mExp += t.amount;
                fList.innerHTML += `<div style="margin-bottom:5px; border-left:2px solid ${isExp?'red':'green'}; padding-left:10px;">${t.name} - ₹${t.amount}</div>`;
            });
            balDisp.innerText = `₹${bal.toLocaleString()}`;

            // Update Intelligence Bar
            document.getElementById('month-expense').innerText = `₹${mExp.toLocaleString()}`;
            document.getElementById('active-streaks').innerText = totalStreaks;
            document.getElementById('month-discipline').innerText = Math.min(totalStreaks * 2, 100) + "%";

            localStorage.setItem('ag_v2_habits', JSON.stringify(habits));
            localStorage.setItem('ag_v2_fin', JSON.stringify(transactions));
        }

        function updateHabit(index, success) {
            if(success) habits[index].streak++;
            else habits[index].streak = 0;
            renderAll();
        }

        function addFin(type) {
            const name = document.getElementById('exp-name').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            if(!name || !amount) return;
            transactions.unshift({name, amount, type, date: new Date()});
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-amount').value = '';
            renderAll();
        }

        // INIT RADAR CHART
        const ctx = document.getElementById('skillRadar').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Networking', 'Coding', 'Design', 'Systems', 'Focus'],
                datasets: [{
                    label: 'Capability',
                    data: [80, 90, 70, 85, 95],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                }]
            },
            options: { scales: { r: { ticks: {display: false}, grid: {color: 'rgba(255,255,255,0.05)'}, angleLines: {color: 'rgba(255,255,255,0.05)'} } }, plugins: {legend: {display: false}} }
        });

        renderAll();
    </script>
</body>
</html>
